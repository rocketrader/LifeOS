<!DOCTYPE html>
<!--
  LifeOS - Personal Task Manager
  Version: v5.4 (cloud sync)

  ARCHITECTURE:
  - Single HTML file, all CSS and JS inline
  - Data stored in localStorage (keys prefixed "los_")
  - No external dependencies, no build step

  VIEWS:
  - Today: overdue / due today / this week / completed / closed
  - Daily routine: AM + Evening + anytime items, auto-resets midnight
  - Forward view: 90-day calendar with tasks on left, dates scrolling right
  - Evening prep: checklist, auto-resets midnight
  - Credit score rules: editable list
  - Import from Claude: paste LIFEOS format blocks
  - Countdown: live timers to named events
  - Version history: snapshots + changelog
  - Projects: GSK, General To Do, Portfolio, Credit Health, Flat Buying, Healing & Wellbeing

  v4.7 FIXES:
  - Added missing var cdInterval declaration (was causing ReferenceError on ALL nav)
  - Restored missing vImport function
  - Restored missing loadCd, saveCd, calcCountdown, cdUnit functions
  - Restored missing addCdEvent, editCdEvent, deleteCdEvent functions
  - Replaced inline onscroll with addEventListener for iOS Safari compatibility

  DATA FORMAT (localStorage):
  - los_tasks: array of task objects {id, project, title, priority, dueDate, notes, completed, completedAt, recurrence}
  - los_rem: array of credit score rules {id, title, active}
  - los_ep: evening prep {items: [{id, title, completed}], lr: dateString}
  - los_rt: routine {checks: {}, custom: [], lr: dateString}
  - los_snaps: array of snapshots for version history
  - los_cd: array of countdown events {id, name, target}
  PRIORITY LEVELS: Urgent, High, Medium, Low
  PROJECTS: GSK, General To Do, Portfolio, Credit Health, Flat Buying, Healing & Wellbeing
-->

<script>
var cdInterval=null;
var V="v5.4";

var FBCFG={
  apiKey:"AIzaSyCuhIldfs8yjJKhzoV_ENff5pTXoegXh2I",
  authDomain:"lifeos-sync-337ef.firebaseapp.com",
  databaseURL:"https://lifeos-sync-337ef-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"lifeos-sync-337ef",
  storageBucket:"lifeos-sync-337ef.firebasestorage.app",
  messagingSenderId:"87995540510",
  appId:"1:87995540510:web:e38d9aa35f8d5a59b07a0f"
};
var fbReady=false;
var fbRef=null;
var syncTimer=null;
var lastLocalSave=0;
var appStarted=false;
function initFB(){
  if(!FBCFG.apiKey||!FBCFG.databaseURL)return false;
  try{firebase.initializeApp(FBCFG);fbReady=true;return true;}catch(ex){return false;}
}
function showPinErr(msg){

}
function submitPin(){
  var inp=document.getElementById("pin-inp");
  if(!inp)return;

  if(pin.length<4){showPinErr("Please enter at least 4 digits");return;}

function skipPin(){
  hidePin();
  startApp();
}
window.skipPin=skipPin;
function doPin(pin){
  localStorage.setItem("los_pin",pin);
  fbRef=firebase.database().ref("users/"+pin);
  setSyncStatus("syncing");
  var btnEl=document.getElementById("pin-btn");
  if(btnEl){btnEl.textContent="Connecting...";btnEl.disabled=true;}
  fbRef.once("value",function(snap){
    var data=snap.val();
    if(data){
      if(data.tasks)localStorage.setItem("los_tasks",JSON.stringify(data.tasks));
      if(data.rem)localStorage.setItem("los_rem",JSON.stringify(data.rem));
      if(data.ep)localStorage.setItem("los_ep",JSON.stringify(data.ep));
      if(data.rt)localStorage.setItem("los_rt",JSON.stringify(data.rt));
      if(data.cd)localStorage.setItem("los_cd",JSON.stringify(data.cd));
    }
    setSyncStatus("ok");
    hidePin();
    startApp();
    if(!data)saveToCloud();
    listenForChanges();
    listenInbox();
  },function(err){
    setSyncStatus("error");
    hidePin();
    startApp();
  });
}
function startApp(){
  if(appStarted)return;
  appStarted=true;
  init();
  schedMidnight();
}
function saveToCloud(){
  if(!fbRef)return;
  setSyncStatus("syncing");
  lastLocalSave=Date.now();
  var data={
    tasks:ST.tasks,
    rem:ST.rem,
    ep:ST.ep,
    rt:ST.rt,
    cd:loadCd(),
    updatedAt:lastLocalSave
  };
  fbRef.set(data,function(err){
    setSyncStatus(err?"error":"ok");
  });
}
function queueSync(){
  if(!fbRef)return;
  clearTimeout(syncTimer);
  syncTimer=setTimeout(saveToCloud,2000);
}
function listenForChanges(){
  if(!fbRef)return;
  var firstFire=true;
  fbRef.on("value",function(snap){
    if(firstFire){firstFire=false;return;}
    var data=snap.val();
    if(!data||!data.updatedAt)return;
    if(data.updatedAt<=lastLocalSave)return;
    if(data.tasks){ST.tasks=data.tasks;localStorage.setItem("los_tasks",JSON.stringify(data.tasks));}
    if(data.rem){ST.rem=data.rem;localStorage.setItem("los_rem",JSON.stringify(data.rem));}
    if(data.ep){ST.ep=data.ep;localStorage.setItem("los_ep",JSON.stringify(data.ep));}
    if(data.rt){ST.rt=data.rt;localStorage.setItem("los_rt",JSON.stringify(data.rt));}
    if(data.cd)localStorage.setItem("los_cd",JSON.stringify(data.cd));
    rSb();rMn();
    setSyncStatus("ok");
  });
}
function listenInbox(){
  if(!fbRef)return;
  var inboxRef=fbRef.child("inbox");
  inboxRef.on("value",function(snap){
    var data=snap.val();
    if(!data)return;
    var items=[];
    if(typeof data==="object"){
      Object.keys(data).forEach(function(k){items.push(data[k]);});
    }
    if(!items.length)return;
    var n=0;
    items.forEach(function(item){
      if(!item||!item.type)return;
      var uid=Date.now()+Math.random().toString(36).slice(2);
      if(item.type==="task"){
        var proj=item.project?fzP(item.project):null;
        ST.tasks.push({id:"ci"+uid,project:proj||PROJ[0],title:item.title||"Untitled",priority:pPri(item.priority),dueDate:pDate(item.dueDate)||null,notes:item.notes||"",recurrence:item.recurrence||null,completed:false});
        n++;
      } else if(item.type==="rule"){
        ST.rem.push({id:"cr"+uid,title:item.title||"",active:true});
        n++;
      } else if(item.type==="routine"){
        var c=ST.rt.custom||[];
        var slot=item.time?item.time.toLowerCase():"am";
        if(slot==="morning")slot="am";if(slot==="evening")slot="eve";
        if(["am","eve","both","anytime"].indexOf(slot)<0)slot="am";
        c.push({id:"cx"+uid,cat:item.category||"Custom",title:item.title||"",time:slot,days:item.days||"daily"});
        ST.rt.custom=c;
        n++;
      } else if(item.type==="eveningprep"){
        ST.ep.items.push({id:"ce"+uid,title:item.title||"",completed:false});
        n++;
      } else if(item.type==="countdown"){
        var events=loadCd();
        events.push({id:"cc"+uid,name:item.name||item.title||"",target:item.target||""});
        saveCd(events);
        n++;
      }
    });
    if(n>0){
      sl("tasks",ST.tasks);sl("rem",ST.rem);sl("ep",ST.ep);sl("rt",ST.rt);
      saveToCloud();
      rSb();rMn();
      showInboxToast(n);
    }
    inboxRef.remove();
  });
}

function vRoutine(){
  var today=new Date();today.setHours(0,0,0,0);
  var dow=today.getDay();var checks=ST.rt.checks||{};
  var custom=ST.rt.custom||[];
  var allItems=RD.concat(custom);
  function isT(r){return r.days==="daily"||(Array.isArray(r.days)&&r.days.includes(dow));}
  function isWkly(r){return Array.isArray(r.days)&&r.days.length<7;}
  var ti=allItems.filter(isT);
  var am=ti.filter(function(r){return r.time==="am"||r.time==="both";});
  var ev=ti.filter(function(r){return r.time==="eve"||r.time==="both";});
  var an=ti.filter(function(r){return r.time==="anytime";});
  var ad=am.filter(function(r){return checks[r.id+"_am"];}).length;
  var ed=ev.filter(function(r){return checks[r.id+"_eve"];}).length;
  var nd=an.filter(function(r){return checks[r.id+"_any"];}).length;
  var total=am.length+ev.length+an.length;
  var done=ad+ed+nd;
  var pct=total?Math.round(done/total*100):0;
  var sub=DN[dow]+", "+today.getDate()+" "+MN[today.getMonth()]+" - "+done+"/"+total+" done";
  function ri(r,slot){
    var k=r.id+"_"+slot;var dn=!!checks[k];
    var wc=isWkly(r)?"rt-weekly ":"";
    var dnc=dn?"dn":"";
    var del=r.id.indexOf("rc")===0?'<button onclick="dRt(\''+r.id+'\')" style="font-size:16px;color:#888882;border:none;background:none;cursor:pointer;padding:0 4px;min-width:28px;opacity:.5">&#215;</button>':"";
    return '<div class="rti '+wc+'">'+
      '<div class="rtik '+dnc+'" onclick="tRt(\''+r.id+'\',\''+slot+'\')"></div>'+
      '<span class="rtit2 '+dnc+'" onclick="tRt(\''+r.id+'\',\''+slot+'\')">'+e(r.title)+'</span>'+del+'</div>';
  }
  function gc(items,slot){
    var cats={};items.forEach(function(r){if(!cats[r.cat])cats[r.cat]=[];cats[r.cat].push(r);});
    return Object.keys(cats).map(function(cat){
      return '<div class="rtca">'+cat+'</div>'+cats[cat].map(function(r){return ri(r,slot);}).join('');
    }).join('');
  }
  function ab(slot){
    return '<button class="rtab" onclick="aRt(\''+slot+'\')"><span style="font-size:16px">+</span> Add item</button>';
  }
  var amPct=am.length?Math.round(ad/am.length*100):0;
  var evPct=ev.length?Math.round(ed/ev.length*100):0;
  var h='<div class="mnp"><div class="pgt">Daily routine</div><div class="pgs">'+sub+'</div>'+
    '<div class="pw"><div class="pb" style="width:'+pct+'%"></div></div>'+
    '<div class="rtg">'+
      '<div><div class="rtch"><span class="rtct am">Morning</span><div class="rtp"><div class="rtpb am" style="width:'+amPct+'%"></div></div><span class="rtcn">'+ad+'/'+am.length+'</span></div>'+gc(am,"am")+ab("am")+'</div>'+
      '<div><div class="rtch"><span class="rtct eve">Evening</span><div class="rtp"><div class="rtpb eve" style="width:'+evPct+'%"></div></div><span class="rtcn">'+ed+'/'+ev.length+'</span></div>'+gc(ev,"eve")+ab("eve")+'</div>'+
    '</div>';
  if(an.length){
    h+='<div style="margin-bottom:14px"><div class="rtch"><span class="rtct" style="color:#555550">Today only</span><span class="rtcn" style="margin-left:auto">'+nd+'/'+an.length+'</span></div>'+gc(an,"any")+ab("any")+'</div>';
  }
  h+='</div>';
  return h;
}

function calcCountdown(target){
  var now=new Date();var t=new Date(target);var diff=t-now;
  var past=diff<0;if(past)diff=-diff;
  var totalSec=Math.floor(diff/1000);
  var months=Math.floor(totalSec/(30*24*3600));totalSec-=months*30*24*3600;
  var weeks=Math.floor(totalSec/(7*24*3600));totalSec-=weeks*7*24*3600;
  var days=Math.floor(totalSec/(24*3600));totalSec-=days*24*3600;
  var hr=Math.floor(totalSec/3600);totalSec-=hr*3600;
  var min=Math.floor(totalSec/60);var sec=totalSec-min*60;
  return{months:months,weeks:weeks,days:days,hr:hr,min:min,sec:sec,past:past};
}

function addCdEvent(){
  var n=document.getElementById("cd-n");
  var dt=document.getElementById("cd-dt");
  var eid=document.getElementById("cd-eid");
  if(!n||!dt||!n.value.trim()||!dt.value)return;
  var events=loadCd();
  if(eid&&eid.value){
    var ev=events.find(function(x){return x.id===eid.value;});
    if(ev){ev.name=n.value.trim();ev.target=dt.value;}
  }else{
    events.push({id:"cd"+Date.now(),name:n.value.trim(),target:dt.value});
  }
  saveCd(events);ST.cdAdding=false;ST.cdEditing=null;rMn();
}

  });

function saveSnap(label){
  var snaps=JSON.parse(localStorage.getItem("los_snaps")||"[]");
  var snap={
    id:"snap"+Date.now(),
    label:label||("Manual save "+new Date().toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"})),
    version:V,
    date:new Date().toISOString(),
    data:{tasks:ST.tasks,rem:ST.rem,ep:ST.ep,rt:ST.rt}
  };
  snaps.unshift(snap);
  if(snaps.length>20)snaps.splice(20);
  localStorage.setItem("los_snaps",JSON.stringify(snaps));
  return snap;
}

function restoreSnap(id){
  var snaps=JSON.parse(localStorage.getItem("los_snaps")||"[]");
  var snap=snaps.find(function(s){return s.id===id;});
  if(!snap)return;
  if(!confirm("Restore data from: "+snap.label+"?\n\nYour current data will be saved as a snapshot first."))return;
  saveSnap("Before restore to: "+snap.label);
  ST.tasks=snap.data.tasks||[];
  ST.rem=snap.data.rem||[];
  ST.ep=snap.data.ep||ST.ep;
  ST.rt=snap.data.rt||ST.rt;
  sl("tasks",ST.tasks);sl("rem",ST.rem);sl("ep",ST.ep);sl("rt",ST.rt);
  alert("Restored successfully.");
  location.reload();
}

function vForward(){
  var DAYS=["Su","Mo","Tu","We","Th","Fr","Sa"];
  var today=new Date();
  today.setHours(0,0,0,0);
  function dstr(d){return d.getFullYear()+"-"+("0"+(d.getMonth()+1)).slice(-2)+"-"+("0"+d.getDate()).slice(-2);}
  var t0=dstr(today);
  var endD=new Date(today);
  endD.setDate(today.getDate()+89);
  var endStr=dstr(endD);
  var days=[];var dc=new Date(today);
  while(dc<=endD){days.push(new Date(dc));dc.setDate(dc.getDate()+1);}
  function isWd(d){return d.getDay()===0||d.getDay()===6;}
  var tasks=ST.tasks.filter(function(t){return !t.completed&&t.dueDate&&t.dueDate>=t0&&t.dueDate<=endStr;});
  tasks.sort(function(a,b){return (a.dueDate||"").localeCompare(b.dueDate||"")||PO[a.priority]-PO[b.priority];});
  var byP={};
  PROJ.forEach(function(p){var pt=tasks.filter(function(t){return t.project===p;});if(pt.length)byP[p]=pt;});
  var keys=Object.keys(byP);
  var lHtml='<div class="fwd-hdr-l">Task</div>';
  keys.forEach(function(proj){
    lHtml+='<div class="fwd-task fwd-grp">'+e(proj)+'</div>';
    byP[proj].forEach(function(task){lHtml+='<div class="fwd-task" title="'+e(task.title)+'">'+e(task.title)+'</div>';});
  });
  if(!keys.length){lHtml+='<div class="fwd-task" style="color:#888882">No upcoming tasks</div>';}
  var thead='<tr>';
  days.forEach(function(d){
    var ds2=dstr(d);var isT=ds2===t0;var wd=isWd(d);
    var cls=isT?"fwd-today":wd?"fwd-wknd":"";
    var nc=isT?" fwd-today-t":"";
    thead+='<th class="'+cls+'"><span class="fwd-dn">'+DAYS[d.getDay()]+'</span><span class="fwd-dd'+nc+'">'+d.getDate()+'</span></th>';
  });
  thead+='</tr>';
  var tbody='';
  keys.forEach(function(proj){
    var gc='';
    days.forEach(function(d){gc+='<td class="'+(isWd(d)?"fwd-wknd":"")+'"></td>';});
    tbody+='<tr class="fwd-grp-r">'+gc+'</tr>';
    byP[proj].forEach(function(task){
      var row='';
      days.forEach(function(d){
        var ds2=dstr(d);var cls=ds2===t0?"fwd-today":isWd(d)?"fwd-wknd":"";
        if(task.dueDate===ds2){
          row+='<td class="'+cls+'"><div class="fwd-x '+PC[task.priority]+'" onclick="doFwdTick(this)" data-id="'+task.id+'">X</div></td>';
        } else {
          row+='<td class="'+cls+'"></td>';
        }
      });
      tbody+='<tr>'+row+'</tr>';
    });
  });
  if(!keys.length){tbody='<tr><td colspan="'+days.length+'" style="padding:40px 20px;text-align:center;color:#888882;font-size:13px">No tasks due in next 90 days.</td></tr>';}
  /* FIX: removed inline onscroll="syncFwd()" - now attached via addEventListener in rMn() for iOS Safari compatibility */
  return '<div style="padding:16px 16px 10px">'+
    '<div class="pgt">Forward view</div>'+
    '<div class="pgs">Next 90 days - scroll right - tap X to complete</div>'+
    '</div>'+
    '<div class="fwd-outer">'+
      '<div class="fwd-left" id="fwd-l">'+lHtml+'</div>'+
      '<div class="fwd-right" id="fwd-r">'+
        '<table class="fwd-tbl"><thead>'+thead+'</thead><tbody>'+tbody+'</tbody></table>'+
      '</div>'+
    '</div>';
}

    else if(/^LIFEOS/i.test(l))headers.push({type:"tasks",idx:i});
  });
  function linesForHeader(hi){
    var start=headers[hi].idx+1;
    var end=(hi+1<headers.length)?headers[hi+1].idx:lines.length;
    return lines.slice(start,end).filter(function(l){return l.startsWith("-");});
  }
  headers.forEach(function(hdr,hi){
    var hLines=linesForHeader(hi);
    if(hdr.type==="tasks"){
      hLines.forEach(function(line,i){
        var c=line.replace(/^-\s*/,"");var pts=c.split("|").map(function(p){return p.trim();});
        if(!pts[0])return;var proj=pts[1]?fzP(pts[1]):null;
        tasks.push({title:pts[0],project:proj,priority:pPri(pts[2]),dueDate:pDate(pts[3]),notes:pts[4]||"",ok:!!proj,_i:i,_p:proj||PROJ[0]});
        if(!proj&&pts[1])errs.push(pts[1]+" not recognised");
      });
    } else if(hdr.type==="rules"){
      hLines.forEach(function(l){var t=l.replace(/^-\s*/,"").trim();if(t)rules.push(t);});
    } else if(hdr.type==="routine"){
      hLines.forEach(function(l){
        var c=l.replace(/^-\s*/,"");var pts=c.split("|").map(function(p){return p.trim();});
        if(!pts[0])return;
        var slot=pts[1]?pts[1].toLowerCase():"am";
        if(slot==="morning")slot="am";if(slot==="evening")slot="eve";
        if(["am","eve","both","anytime"].indexOf(slot)<0)slot="am";
        routines.push({title:pts[0],time:slot});
      });
    } else if(hdr.type==="ep"){
      hLines.forEach(function(l){var t=l.replace(/^-\s*/,"").trim();if(t)epItems.push(t);});
    } else if(hdr.type==="cd"){
      hLines.forEach(function(l){
        var c=l.replace(/^-\s*/,"");var pts=c.split("|").map(function(p){return p.trim();});
        if(!pts[0])return;
        countdowns.push({name:pts[0],target:pts[1]||""});
      });
    }
  });
  ST.ip=tasks;ST.ir=rules;ST.iRt=routines;ST.iEp=epItems;ST.iCd=countdowns;ST.ie=errs;rIPrev();
}

function rMn(){

  else if(ST.view==="routine")m.innerHTML=vRoutine();
  else if(ST.view==="import")m.innerHTML=vImport();
  else if(ST.view==="evening")m.innerHTML=vEp();
  else if(ST.view==="reminders")m.innerHTML=vRem();
  else if(ST.view==="forward"){
    m.style.overflow="hidden";
    m.innerHTML=vForward();
    /* FIX: attach scroll listener via JS instead of inline onscroll for iOS Safari */
    var fwdR=document.getElementById("fwd-r");

    m.innerHTML=vCountdown();

}

function rSb(){
  var sb=document.getElementById("sb");if(!sb)return;
